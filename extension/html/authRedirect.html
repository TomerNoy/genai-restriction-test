<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style/authRedirect.css">
</head>
<body class="ps-modal">
    <div class="shadow"></div>
    <div class="frame">
        <div class="title-box">
            <svg xmlns="http://www.w3.org/2000/svg" fill="#EC3177" height="24" viewBox="0 -960 960 960" width="24">
                <path d="M480-120v-80h280v-560H480v-80h280q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H480Zm-80-160-55-58 102-102H120v-80h327L345-622l55-58 200 200-200 200Z"/>
            </svg>
            <div class="title-text">Authentication Required</div>
        </div>

        <div class="horizontal-line"></div>

        <div class="content-box">
            <div class="message-box">
                <svg xmlns="http://www.w3.org/2000/svg" fill="#5D5D5D" height="24" viewBox="0 -960 960 960" width="24" style="margin-top: -2px">
                    <path d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                </svg>
                <div class="message-title">Please sign in with your identity provider to continue using AI applications</div>
            </div>

            <div class="auth-status">
                <div class="spinner"></div>
                <div class="countdown-message">Redirecting to your provider login page in <span id="countdown">5</span> seconds...</div>
            </div>
        </div>

        <div class="horizontal-line"></div>

        <div class="footer">
            <div class="powered-by">
                <div class="powered-by-text">Powered by:</div>
                <a href="https://prompt.security" target="_blank">
                    <img class="powered-by-logo" src="/images/prompt_logo.png" alt="Prompt Security">
                </a>
            </div>
        </div>
    </div>

    <script src="/bundle/authRedirect.bundle.js"></script>
</body>
</html>
